<header class="site-header">
  <div class="container">
    <a href="/" class="site-logo" aria-label="Dastkaari Home">
      <span class="logo-text">Dastkaari</span>
    </a>
    <nav class="site-nav" aria-label="Main navigation">
      <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-list">
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} class="active" aria-current="page"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>

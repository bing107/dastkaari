{{ define "main" }}
<section class="page-header">
  <div class="container">
    <h1>{{ .Title }}</h1>
  </div>
</section>

<section class="taxonomy-listing">
  <div class="container">
    <div class="taxonomy-list">
      {{ range .Pages }}
      <a href="{{ .Permalink }}" class="taxonomy-item">
        <span class="taxonomy-name">{{ .Title }}</span>
        <span class="taxonomy-count">{{ len .Pages }}</span>
      </a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
